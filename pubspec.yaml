name: location_protocol_flutter_app
description: Location Protocol Signature Service demo app — implements EIP-712 signing of location attestations using the Ethereum Attestation Service schema.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Ethereum primitives — shared transitive deps of location_protocol; listed
  # here as direct deps so the app can use them without relying on implicit
  # resolution.  Versions are pinned to the same constraints used by the library.
  on_chain: ^8.0.0
  blockchain_utils: ^6.0.0
  cupertino_icons: ^1.0.8
  convert: ^3.1.1
  privy_flutter: ^0.4.0
  flutter_dotenv: ^5.1.0
  # DecentralizedGeo/location-protocol-dart is a WIP Dart library implementing
  # the Location Protocol base data model on EAS.  It is not yet published on
  # pub.dev, so it is referenced directly from its GitHub repository.
  location_protocol:
    git:
      url: https://github.com/DecentralizedGeo/location-protocol-dart.git
      ref: 3a6d08781a18601428abaaf78d2cb7530d222896

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
